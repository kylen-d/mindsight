name: Release

# Prepared, not yet exercised. Pushing a tag like `v1.0.0` builds the wheel +
# sdist and both installer zips (each zip's content census must pass, or the
# build fails), then publishes them -- plus the lockfile, weights manifest,
# installers and INSTALL docs -- as assets on a GitHub Release. No tag is ever
# pushed automatically; see installer/RELEASE-CHECKLIST.md for the manual
# [USER] sequence.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the tagged commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Build wheel and sdist
        run: python -m build --outdir dist/

      - name: Build installer zips (census gates each build)
        run: |
          python installer/make_release_zip.py --platform win --out dist/
          python installer/make_release_zip.py --platform mac --out dist/

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          cp dist/*.whl release-assets/
          cp dist/*.tar.gz release-assets/
          cp dist/MindSight-*-win.zip release-assets/
          cp dist/MindSight-*-mac.zip release-assets/
          cp uv.lock release-assets/
          cp weights_manifest.json release-assets/
          cp installer/Install-MindSight.bat release-assets/
          cp installer/Install-MindSight.command release-assets/
          cp installer/INSTALL-WINDOWS.md release-assets/
          cp installer/INSTALL-MACOS.md release-assets/
          ls -la release-assets/

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "MindSight ${GITHUB_REF_NAME}" \
            --generate-notes \
            release-assets/*
