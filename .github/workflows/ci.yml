# Deliberately minimal (ruling 2026-07-12): lint only. The release gate of
# record is the LOCAL procedure in the baseline docs (pytest floor + smokes +
# golden diffs) -- CI does not attempt to replicate it. Revisit real CI only if
# outside contributors start committing, commits land without the local gate,
# or Windows breakage reports arrive.
name: Lint

on:
  push:
  pull_request:

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.9"
          args: check .
