site_name: MindSight
site_description: Eye-Gaze Intersection Tracker for Behavioral Neuroscience Research

theme:
  name: material
  logo: assets/brand/mindsight_icon.png
  favicon: assets/brand/mindsight_icon.png
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

extra_css:
  - stylesheets/mindsight.css

plugins:
  - search

# docs/superpowers/ is gitignored tooling debris -- keep it out of the build
# so strict mode does not flag it as orphaned (not-in-nav) pages.
exclude_docs: |
  superpowers/

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Get Started:
      - Home: index.md
      - Install: getting-started/installation.md
      - Run a Study (Tutorial): studies/run-a-study-tutorial.md
      - Quickstart (CLI): getting-started/quickstart-cli.md
      - Quickstart (GUI): getting-started/quickstart-gui.md
      - Your First Project: getting-started/first-project.md
      - Getting Started Overview: getting-started/index.md
  - GUI Guides:
