# MindSight Pipeline — Full-feature test config
# Equivalent to:
#   python MindSight.py --source test_data/testangled.mp4 --model yoloe-26s-seg.pt
#     --conf 0.05 --mgaze-model .../resnet50_gaze.onnx --skip-frames 1
#     --detect-scale 0.75 --ray-length 1.5 --gaze-cone 5 --all-phenomena
#     --adaptive-ray --gaze-tips --tip-radius 40 --classes plate --mgaze-arch resnet50
#     --gaze-debug --heatmap heatmaps/ --novel-salience

source: "test_data/testangled.mp4"

detection:
  model: "yoloe-26s-seg.pt"
  conf: 0.05
  classes:
    - "plate"
  detect_scale: 0.75
  skip_frames: 1

gaze:
  ray_length: 1.5
  adaptive_ray: extend
  gaze_tips: true
  tip_radius: 40
  gaze_cone: 5
  # gaze_lock: true   # Uncomment to enable fixation lock-on (off by default)
  gaze_debug: true

phenomena:
  - joint_attention:
      ja_window: 10
  - mutual_gaze: {}
  - social_referencing: {}
  - gaze_following: {}
  - gaze_aversion: {}
  - scanpath: {}
  - gaze_leadership: {}
  - attention_span: {}

output:
  heatmaps: "heatmaps/"

# Plugin-specific settings — keys map directly to CLI flags (hyphens or underscores).
# Any plugin argument works here without needing a hardcoded mapping.
plugins:
  mgaze_model: "GazeTracking/Backends/MGaze/gaze-estimation/weights/resnet50_gaze.onnx"
  mgaze_arch: "resnet50"
  novel_salience: true
