# MindSight -- Known-Good Pipeline Configuration
#
# A pre-tuned, ready-to-run pipeline preset. Every value is traceable to
# configs/KNOWN_GOOD.md, the living record of empirically validated
# parameters. This revision is the user's full GUI export of 2026-07-09
# ("KG_Standard"), taken with the full-fidelity exporter, with four values
# ruled on during review (merge overlaps, blend cadence, detector, ReID
# grace -- see KNOWN_GOOD.md changelog). Values were validated on
# classroom-style dyadic footage; a new study may still want to re-check
# them against its own footage.
#
# Usage:
#   python MindSight.py --pipeline configs/pipeline_known_good.yaml \
#       --source path/to/video.mp4
# or point a project at it (project.yaml: `pipeline: <path to this file>`).
# CLI flags override any value set here. The GUI seeds from this file on a
# fresh install, and (from the 2026-07 builds) Reset Defaults reapplies it.
#
# NOTE: this file deliberately sets NO `source:` -- the video is a runtime
# input, and a preset that pinned one would clobber the user's selection on
# import.
#
# Weight paths are BARE FILENAMES on purpose: MindSight resolves a bare name
# to <install>/Weights/<backend>/<name>, so the same config works on any
# machine regardless of where the app is installed. Do NOT rewrite these to
# absolute or relative paths.

# ── Object detection ─────────────────────────────────────────────────────────
detection:
  # Small fast COCO detector for YOLO mode (user ruling 2026-07-09).
  # Project runs with a .vp.json visual prompt use vp_model instead.
  model: "yolov8n.pt"
  conf: 0.25
  detect_scale: 1.0
  vp_model: "yoloe-26l-seg.pt"
  skip_frames: 1
  obj_persistence: 0

# ── Gaze / ray geometry ──────────────────────────────────────────────────────
gaze:
  ray_length: 1.3
  adaptive_ray: "off"
  snap_dist: 150.0
  snap_bbox_scale: 0.0
  snap_w_dist: 1.0
  snap_w_angle: 0.8
  snap_w_size: 0.0
  snap_w_intersect: 0.5
  snap_w_temporal: 0.3
  snap_gate_angle: 60.0
  snap_head_blend: 0.3
  snap_quality_thresh: 0.8
  snap_tip_dist: -1.0
  snap_tip_quality: -1.0
  conf_ray: false
  # Gaze tips: tip convergence counts as joint attention and tracks phenomena
  # in lieu of object detections (user rulings 2026-07-09).
  gaze_tips: true
  tip_radius: 70
  gaze_cone: 5.0
  gaze_lock: false
  dwell_frames: 15
  lock_dist: 100
  gaze_debug: false
  snap_release_frames: 5
  snap_engage_frames: 0
  # Ruled 2026-07-09: keep the validated 4-5 s window (export carried the
  # 1.0 widget default).
  reid_grace_seconds: 4.5
  hit_conf_gate: 0.0
  detect_extend: 0.0
  detect_extend_scope: both

# ── Output ───────────────────────────────────────────────────────────────────
output:
  anonymize_padding: 0.3

# ── Performance ──────────────────────────────────────────────────────────────
performance:
  fast: false
  skip_phenomena: 0
  lite_overlay: false
  # Skip side-panel dashboard composition for throughput; saved annotated
  # videos show the raw annotated frame (user-validated 2026-07-08).
  no_dashboard: true
  profile: false

# ── Depth (disabled by default) ──────────────────────────────────────────────
depth:
  enabled: false
  backend: midas_small
  input_size: 384
  skip_frames: 1
  depth_aware_scoring: false
  snap_w_depth: 0.4

# ── Phenomena trackers ───────────────────────────────────────────────────────
# All eight trackers default ON (user ruling 2026-07-09). Explicit list so the
# strict schema records every toggle; plugins.all_phenomena mirrors the GUI
# export. JA params are the exported values (window 0 = temporal filter off).
phenomena:
  - joint_attention:
      ja_window: 0
      ja_quorum: 1.0
      ja_window_thresh: 0.7
  - mutual_gaze
  - social_referencing
  - gaze_following
  - gaze_aversion
  - scanpath
  - gaze_leadership
  - attention_span

# ── Plugin / backend settings (namespace pass-through) ───────────────────────
# Keys map directly to CLI flags. Weight values are BARE FILENAMES.
plugins:
  all_phenomena: true

  # Per-face gaze backend: MobileGaze resnet50, DEVICE-SWITCHING (user ruling
  # 2026-07-09). An extensionless family name resolves per machine:
  # resnet50.pt on NVIDIA/CUDA systems, resnet50_gaze.onnx on Macs/CPU.
  # The lighter builds live in configs/pipeline_low_power.yaml.
  mgaze_model: "resnet50"
  mgaze_dataset: "gaze360"

  # ── Gaze-LLE Blend (primary operating mode) ──
  rf_gazelle_model: "gazelle_dinov2_vitb14.pt"
  rf_gazelle_name: "gazelle_dinov2_vitb14"
  gazelle_name: "gazelle_dinov2_vitb14"
  # Inference cadence. Ruled 2026-07-09: 25 (the pre-rewrite recommended
  # interval; export carried the 30 widget default, pre-rewrite KNOWN_GOOD
  # said 10).
  min_call_gap: 25
  gazelle_device: auto
  gazelle_inout_threshold: 0.5
  gazelle_skip_frames: 0
  gazelle_fp16: false
  gazelle_compile: false
  # Blend tuning (KNOWN_GOOD.md "Gaze-LLE Blend", 2026-07-05).
  dir_beta: 0.5
  len_beta: 0.3
  len_hold_tau: 5.0
  fixation_v_threshold: 0.04
  fixation_d_threshold: 0.15
  dir_min_cutoff: 1.0
  len_min_cutoff: 1.0

  # Ray forming extras (user export 2026-07-09).
  forward_gaze_threshold: 13.0
  smooth_snap: all
  smooth_snap_alpha: 0.9
  gaze_leader_tips: false
  gaze_leader_tip_lag: 15

  # ── Merge overlaps (detection) ──
  # Ruled 2026-07-09: keep KNOWN_GOOD on/dynamic/0.55 (the export predates
  # the exporter fix that made these keys exportable).
  merge_overlaps: true
  merge_overlap_strategy: "dynamic"
  merge_overlap_threshold: 0.55
